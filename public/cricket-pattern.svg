  <!--
    Each scene is drawn fully inline at its position (no <use> to avoid rotation origin bugs).
    Scene: stumps in back, bat angled ~40deg as if mid-swing, small ball near the blade face.
    Ball radius = 7, bat blade = 14x50px. Bat is clearly bigger than ball.
  -->

  <!-- ===== SCENE MACRO (copy-pasted 12x, each with its own translate+rotate) ===== -->
  <!-- Scene at 80,80 rotated -10deg -->
  <g transform="translate(80 80) rotate(-10)" opacity="0.08">
    <rect x="0"  y="0" width="4" height="38" rx="2" fill="#cead80"/>
