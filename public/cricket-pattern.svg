    <rect x="20" y="0" width="4" height="38" rx="2" fill="#cead80"/>
    <rect x="-2" y="0" width="28" height="4" rx="2" fill="#e0c898"/>
    <rect x="-2" y="9" width="28" height="4" rx="2" fill="#e0c898"/>
    <g transform="translate(34 -8) rotate(40)">
      <rect x="-3" y="0" width="6" height="22" rx="2" fill="#7a4f2a"/>
      <rect x="-7" y="22" width="14" height="42" rx="5" fill="#c8702a"/>
      <rect x="-1" y="25" width="2" height="34" rx="1" fill="#a85b1f" opacity="0.5"/>
    </g>
    <circle cx="-2" cy="22" r="7" fill="#cc3333" stroke="#881111" stroke-width="1"/>
    <path d="M-8 18 Q-2 25 4 18" stroke="white" stroke-width="0.8" fill="none"/>
    <path d="M-8 26 Q-2 19 4 26" stroke="white" stroke-width="0.8" fill="none"/>
  </g>

